// ── Auto-pick text color for contrast ──
function contrastColor(hexStr) {
  const r = parseInt(hexStr.slice(1,3),16);
  const g = parseInt(hexStr.slice(3,5),16);
  const b = parseInt(hexStr.slice(5,7),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.45 ? '#0a0a14' : '#ffffff';
}

// ── Bake text directly onto sphere surface ──
// Text is sized and wrapped to fit within the visible front circle of the sphere.
function makeSphereTexture(text, sphereColor, textColor) {
  const sz = 512;
  const cx2 = sz / 2;
  // The front-facing readable zone is a circle. ~36% of sz radius is safe from distortion.
  const safeR = sz * 0.18;  // 18% — text stays well within front-facing circle
  const safeW = safeR * 1.75; // max line width within that circle

  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const cx = cv.getContext('2d');

  // Base color
  cx.fillStyle = sphereColor;
  cx.fillRect(0,0,sz,sz);

  // Subtle specular (away from center text zone)
  const g = cx.createRadialGradient(sz*.36,sz*.33,sz*.03, sz*.5,sz*.5,sz*.52);
  g.addColorStop(0,'rgba(255,255,255,0.18)');
  g.addColorStop(1,'rgba(0,0,0,0.25)');
  cx.fillStyle=g; cx.fillRect(0,0,sz,sz);

  // Auto contrast text color
  const tc = (textColor && textColor !== '#ffffff') ? textColor : contrastColor(sphereColor);

  cx.textAlign = 'center';
  cx.textBaseline = 'middle';

  function getLines(fsz) {
    cx.font = `bold ${fsz}px Arial,sans-serif`;
    const words = text.split(' ');
    const lines = []; let cur = '';
    for (const w of words) {
      const test = cur ? cur+' '+w : w;
      if (cx.measureText(test).width > safeW) { if(cur) lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines;
  }

  // Shrink font until all lines fit width AND total height fits within circle
  let fsz = 60;
  let lines, lh, totalH;
  while (fsz >= 14) {
    lines = getLines(fsz);
    lh = fsz * 1.2;
    totalH = lines.length * lh;
    cx.font = `bold ${fsz}px Arial,sans-serif`;
    const maxW = Math.max(...lines.map(l => cx.measureText(l).width));
    if (maxW <= safeW && totalH <= safeR * 1.65) break;
    fsz -= 2;
  }

  cx.font = `bold ${fsz}px Arial,sans-serif`;
  lh = fsz * 1.2;
  const startY = cx2 - ((lines.length - 1) * lh) / 2;

  lines.forEach((l, i) => {
    const y = startY + i * lh;
    // Readable shadow regardless of sphere color
    const shadowCol = (tc === '#ffffff') ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.45)';
    cx.fillStyle = shadowCol;
    cx.fillText(l, cx2+1.5, y+1.5);
    cx.fillStyle = tc;
    cx.fillText(l, cx2, y);
  });

  return new THREE.CanvasTexture(cv);
}

function sphere(r, col, emI=0.18, label='', textColor=null) {
  let mat;
  if(label){
    const hexCol='#'+col.toString(16).padStart(6,'0');
    const tex=makeSphereTexture(label,hexCol,textColor);
    mat=new THREE.MeshStandardMaterial({map:tex,emissiveMap:tex,emissive:new THREE.Color(col),emissiveIntensity:emI,roughness:0.42,metalness:0.22});
  } else {
    mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:emI,roughness:0.38,metalness:0.28});
  }
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(r,36,36),mat);
  mesh.rotation.y = -Math.PI / 2; // face texture toward camera (+Z)
  return mesh;
}

// Stub — labels now live on the sphere surface
function labelSprite(text,color,fsz,scaleX,scaleY){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({transparent:true,opacity:0}));
  sp.scale.set(scaleX||7,scaleY||1.6,1); sp.visible=false; return sp;
}

function spawnSubSpheres(task, parentMesh, depth=0) {
  if (!task.sphereSubs || !task.sphereSubs.length) return;
  const r = 9 - depth*2.2;
  const subR = Math.max(1.4, INDIV_R * 0.85 - depth*0.3);
  task.sphereSubs.forEach((sub,i)=>{
    if (subMesh.has(sub.id)) return;
    const ang = (i/task.sphereSubs.length)*Math.PI*2;
    const x = parentMesh.position.x + Math.cos(ang)*r;
    const y = parentMesh.position.y + Math.sin(ang)*r*0.7;
    const m = sphere(subR, INDIV_COL, 0.15, sub.name);
    m.position.set(x,y,parentMesh.position.z);
    m.scale.setScalar(0.01);
    m.userData = {id:sub.id, type:'subtask', task:sub, clickable:true, parentId:task.id};
    m.visible = true;
    scene.add(m); allMeshes.push(m);
    subMesh.set(sub.id, m);
    const entry={mesh:m, parent:parentMesh, r, spd:0.07+Math.random()*0.04, ang, ys:0.7, label:null};
    orbiters.push(entry);
    floaters.push({mesh:m, baseY:y, speed:0.8, amp:0.08, phase:Math.random()*Math.PI*2});
    const lbl = labelSprite(sub.name, hex(INDIV_COL), 7.5, 4.5, 1.0);
    lbl.position.copy(m.position); lbl.position.y += subR+1.0;
    scene.add(lbl);
    entry.label = lbl;
    tweenScale(m, 0.01, 1, 420);
  });
}

function removeSubSpheres(task) {
  if (!task.sphereSubs) return;
  task.sphereSubs.forEach(sub=>{
    const m = subMesh.get(sub.id);
    if (!m) return;
    // recursively remove children first
    removeSubSpheres(sub);
    openTasks.delete(sub.id);
    tweenScale(m, m.scale.x, 0.01, 280, ()=>{
      scene.remove(m);
      const idx = allMeshes.indexOf(m); if(idx>-1) allMeshes.splice(idx,1);
      const oi = orbiters.findIndex(o=>o.mesh===m);
      if(oi>-1){
        const lbl=orbiters[oi].label;
        if(lbl) scene.remove(lbl);
        orbiters.splice(oi,1);
      }
      const fi = floaters.findIndex(f=>f.mesh===m); if(fi>-1) floaters.splice(fi,1);
      subMesh.delete(sub.id);
    });
  });
}

//  TWEEN HELPERS
// ═══════════════════════════════════════════
const tweens=[];
function tweenScale(mesh, from, to, dur, cb){
  const start=performance.now();
  tweens.push({mesh,from,to,dur,start,cb});
}
function tweenCamera(toPos, toLook, dur=1000, cb){
  if(flyBusy) return;
  flyBusy=true;
  const sp=camera.position.clone(), sl=currentLook.clone(), st=performance.now();
  tweens.push({
    custom: t=>{
      camera.position.lerpVectors(sp,toPos,t);
      currentLook.lerpVectors(sl,toLook,t);
      camera.lookAt(currentLook);
    },
    dur, start:st,
    cb:()=>{ flyBusy=false; if(cb)cb(); }
  });
}
function easeCubic(t){ return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }

  openPersons.add(p);
  personMeshes[p].forEach(m=>{
    m.visible=true; m.scale.setScalar(0.01);
    tweenScale(m,0.01,1,480);
    const oi=orbiters.find(o=>o.mesh===m);
    if(oi && oi.label){ oi.label.visible=true; oi.label.scale.setScalar(0.01); tweenScale(oi.label,0.01,1,480); }
  });
}
function hidePerson(p){
  openPersons.delete(p);
  personMeshes[p].forEach(m=>{
    // close any open desc / sub-spheres
    if(openTasks.has(m.userData.id)){
      openTasks.delete(m.userData.id);
      removeSubSpheres(m.userData.task);
    }
    tweenScale(m,m.scale.x,0.01,280,()=>{ m.visible=false; m.scale.setScalar(1); });
    const oi=orbiters.find(o=>o.mesh===m);
    if(oi && oi.label) tweenScale(oi.label,oi.label.scale.x,0.01,280,()=>{ oi.label.visible=false; oi.label.scale.setScalar(1); });
  });
  document.getElementById('info-panel').classList.remove('vis');
}

// ═══════════════════════════════════════════
//  INFO PANEL
// ═══════════════════════════════════════════
function showInfo(task){
  const col = hex(C[task.who]||0xffffff);
  document.getElementById('ip-title').textContent = task.name;
  document.getElementById('ip-title').style.color = col;
  document.getElementById('ip-who').textContent = task.who;
  document.getElementById('ip-who').style.color = col;
  let h='';
  if(task.notes && !task.notes.includes('no notes')){
    h+=`<div class="ip-lbl">Notes</div><div>${task.notes}</div>`;
  }
  if(task.int && task.int.length){
    h+=`<div class="ip-lbl">Internal Influence</div><div>${task.int.join(', ')}</div>`;
  }
  if(task.out && task.out.length){
    h+=`<div class="ip-lbl">Outside Influence</div><div>${task.out.join(', ')}</div>`;
  }
  if(task.subs && task.subs.length){
    h+=`<div class="ip-lbl">Subtasks</div><ul class="ip-list">`;
    task.subs.forEach(s=>{
      if(typeof s==='string') h+=`<li>${s}</li>`;
      else {
        const bc=hex(C[s.badge]||0xffffff);
        h+=`<li>${s.text} <span class="badge" style="background:${bc}">${initials(s.badge)}</span></li>`;
      }
    });
    h+='</ul>';
  }
  if(task.sphereSubs && task.sphereSubs.length){
    h+=`<div class="ip-lbl">Sub-Projects (click spheres to expand)</div><ul class="ip-list">`;
    task.sphereSubs.forEach(s=>{ h+=`<li>${s.name}</li>`; });
    h+='</ul>';
  }
  document.getElementById('ip-body').innerHTML = h || '<span style="opacity:0.45">No additional detail.</span>';
  document.getElementById('info-panel').classList.add('vis');
}

document.getElementById('ip-x').addEventListener('click',()=>{
  document.getElementById('info-panel').classList.remove('vis');
});

// ═══════════════════════════════════════════
//  SVG CONNECTION LINE
// ═══════════════════════════════════════════
let svgLine = null;
const svgEl = document.getElementById('svg-overlay');

function updateSvgLine(mesh){
  // Remove old
  if(svgLine){ svgEl.removeChild(svgLine); svgLine=null; }
  // Project sphere center to screen
  const pos = mesh.position.clone();
  pos.project(camera);
  const sx = (pos.x*.5+.5)*innerWidth;
  const sy = (-.5*pos.y+.5)*innerHeight;
  // Panel
  const panel = document.getElementById('info-panel');
  const pr = panel.getBoundingClientRect();
  if(pr.width===0) return;
  const tx = pr.left+pr.width/2, ty = pr.top+20;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  const cx1=sx+(tx-sx)*0.4, cy1=sy, cx2=sx+(tx-sx)*0.6, cy2=ty;
  path.setAttribute('d',`M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${tx},${ty}`);
  path.setAttribute('stroke','rgba(255,255,255,0.55)');
  path.setAttribute('stroke-width','1');
  path.setAttribute('fill','none');
  svgEl.appendChild(path);
  svgLine=path;
}
function clearSvgLine(){
  if(svgLine){ svgEl.removeChild(svgLine); svgLine=null; }
}

// ═══════════════════════════════════════════
//  CLICK HANDLING
// ═══════════════════════════════════════════
const ray = new THREE.Raycaster();
const mouse2 = new THREE.Vector2();
let mdPos = {x:0,y:0};

canvas.addEventListener('mousedown',e=>{ mdPos={x:e.clientX,y:e.clientY}; });
canvas.addEventListener('mouseup',e=>{
  if(Math.hypot(e.clientX-mdPos.x,e.clientY-mdPos.y)>6) return;
  mouse2.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mouse2,camera);
  const hits = ray.intersectObjects(allMeshes.filter(m=>m.visible));
  if(!hits.length) return;
  onClick(hits[0].object);
});

function onClick(m){
  const ud=m.userData;
  if(!ud.clickable) return;

  // ── OPHS Welcome ──
  if(ud.type==='ophs'){
    if(welcomeDone) return;
    welcomeDone=true;
    document.getElementById('hint').style.display='none';
    tweenCamera(new THREE.Vector3(0,0,120), new THREE.Vector3(0,0,0), 1800);
    return;
  }

  // ── Name sphere ──
  if(ud.type==='name'){
    const p=ud.person;
    const btn=document.querySelector(`.cb[data-p="${p}"]`);
    if(openPersons.has(p)){
      openPersons.delete(p); hidePerson(p);
      if(btn) btn.classList.remove('on');
    } else {
      showPerson(p);
      if(btn) btn.classList.add('on');
      tweenCamera(
        m.position.clone().add(new THREE.Vector3(0,0,44)),
        m.position.clone(), 900
      );
    }
    return;
  }

  // ── Task / Subtask sphere ──
  if(ud.type==='task' || ud.type==='subtask'){
    const id=ud.id, task=ud.task;
    if(openTasks.has(id)){
      openTasks.delete(id);
      removeSubSpheres(task);
      clearSvgLine();
      document.getElementById('info-panel').classList.remove('vis');
    } else {
      openTasks.add(id);
      showInfo(task);
      spawnSubSpheres(task, m);
      tweenCamera(
        m.position.clone().add(new THREE.Vector3(0,0,28)),
        m.position.clone(), 700
      );
      // defer svg line until panel is visible
      requestAnimationFrame(()=>updateSvgLine(m));
    }
    return;
  }

  // ── Influence sphere — fly to it ──
  if(ud.type==='influence'){
    const zOffset = ud.layer==='outside' ? 40 : 28;
    tweenCamera(m.position.clone().add(new THREE.Vector3(0,0,zOffset)),m.position.clone(),900);
    return;
  }
}

// ═══════════════════════════════════════════
//  ORBIT CONTROLS (manual drag + scroll)
// ═══════════════════════════════════════════
let drag=false, prevM={x:0,y:0};
canvas.addEventListener('mousedown',e=>{ drag=true; prevM={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag||flyBusy) return;
  const dx=e.clientX-prevM.x, dy=e.clientY-prevM.y;
  prevM={x:e.clientX,y:e.clientY};
  const off=new THREE.Vector3().subVectors(camera.position,currentLook);
  const sph=new THREE.Spherical().setFromVector3(off);
  sph.theta-=dx*.004; sph.phi-=dy*.004;
  sph.phi=Math.max(.1,Math.min(Math.PI-.1,sph.phi));
  off.setFromSpherical(sph);
  camera.position.copy(currentLook).add(off);
  camera.lookAt(currentLook);
  if(svgLine && openTasks.size){
    // find active mesh
    for(const [id,mesh] of taskMesh){
      if(openTasks.has(id)){ updateSvgLine(mesh); break; }
    }
  }
});
canvas.addEventListener('wheel',e=>{
  if(flyBusy) return;
  const off=new THREE.Vector3().subVectors(camera.position,currentLook);
  const d=Math.max(6,Math.min(500,off.length()*(e.deltaY>0?1.1:0.9)));
  off.normalize().multiplyScalar(d);
  camera.position.copy(currentLook).add(off);
},{passive:true});

// Touch
let tPrev={x:0,y:0};
canvas.addEventListener('touchstart',e=>{ drag=true; tPrev={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!drag) return;
  const dx=e.touches[0].clientX-tPrev.x, dy=e.touches[0].clientY-tPrev.y;
  tPrev={x:e.touches[0].clientX,y:e.touches[0].clientY};
  const off=new THREE.Vector3().subVectors(camera.position,currentLook);
  const sph=new THREE.Spherical().setFromVector3(off);
  sph.theta-=dx*.004; sph.phi-=dy*.004;
  sph.phi=Math.max(.1,Math.min(Math.PI-.1,sph.phi));
  off.setFromSpherical(sph);
  camera.position.copy(currentLook).add(off);
  camera.lookAt(currentLook);
},{passive:true});
canvas.addEventListener('touchend',()=>drag=false);

// Pointer cursor
canvas.addEventListener('mousemove',e=>{
  mouse2.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  ray.setFromCamera(mouse2,camera);
  const hits=ray.intersectObjects(allMeshes.filter(m=>m.visible));
  canvas.style.cursor = hits.length&&hits[0].object.userData.clickable?'pointer':'default';
});

});

// ═══════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  clock+=0.016;

  // Process tweens
  const now=performance.now();
  for(let i=tweens.length-1;i>=0;i--){
    const tw=tweens[i];
    const t=Math.min((now-tw.start)/tw.dur,1);
    const e=easeCubic(t);
    if(tw.custom){ tw.custom(e); }
    else { const s=tw.from+(tw.to-tw.from)*e; tw.mesh.scale.setScalar(s); }
    if(t>=1){ if(tw.cb) tw.cb(); tweens.splice(i,1); }
  }

  // Floaters (gentle bob)
  floaters.forEach(f=>{
    if(!f.mesh.parent) return;
    f.mesh.position.y = f.baseY + Math.sin(clock*f.speed+f.phase)*f.amp;
  });

  // Orbiters (rotate around parent)
  orbiters.forEach(o=>{
    o.ang += o.spd * 0.012;
    const px = o.parent.position.x + Math.cos(o.ang)*o.r;
    const py = o.parent.position.y + Math.sin(o.ang)*o.r*o.ys;
    o.mesh.position.x=px; o.mesh.position.y=py;
    // keep float base in sync
    const fi=floaters.find(f=>f.mesh===o.mesh);
    if(fi) fi.baseY=py;
    // move label with mesh
    if(o.label && o.label.visible){
      o.label.position.x=px;
      o.label.position.y=py+o.mesh.geometry.parameters.radius+1.2;
    }
  });

  // OPHS sphere pulse
  ophs.material.emissiveIntensity = 0.3+Math.sin(clock*1.1)*0.18;

  renderer.render(scene,camera);
}
